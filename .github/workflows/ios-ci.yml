name: Maxgravity CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bridge:
    name: Bridge checks
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install bridge dependencies
        run: npm ci

      - name: Bridge lint
        run: npm run lint

      - name: Bridge typecheck
        run: npm run typecheck

      - name: Bridge tests
        run: npm test

      - name: Bridge build
        run: npm run build

      - name: Bridge security audit
        run: npm run security:audit

      - name: Bridge secret scan
        run: npm run secret-scan

      - name: Bridge license summary
        run: npm exec --yes license-checker -- --summary --production

  ios:
    name: iOS build and packaging
    needs: bridge
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Check iOS static policy
        run: node scripts/check-ios-static.mjs

      - name: Private Apple API guard
        run: node scripts/check-private-apple-apis.mjs

      - name: Build Maxgravity for device
        run: >
          xcodebuild
          -project Maxgravity.xcodeproj
          -scheme Maxgravity
          -configuration Release
          -sdk iphoneos
          -derivedDataPath build/DerivedData
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=""
          build

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/Maxgravity.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            exit 1
          fi
          mkdir -p artifacts build/Payload
          rm -rf build/Payload
          mkdir -p build/Payload
          IPA_PATH="artifacts/Maxgravity.ipa"
          (
            cd build
            cp -R "DerivedData/Build/Products/Release-iphoneos/Maxgravity.app" Payload/Maxgravity.app
            /usr/bin/zip -qry "../${IPA_PATH}" Payload
          )
          echo "IPA_PATH=${IPA_PATH}" >> "$GITHUB_ENV"

      - name: Validate IPA structure
        run: >
          node scripts/validate-ipa.mjs
          "${{ env.IPA_PATH }}"
          "com.antigravity.Maxgravity"
          "Maxgravity"
          "artifacts/Maxgravity.ipa.sha256"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: maxgravity-ipa
          path: |
            ${{ env.IPA_PATH }}
            artifacts/Maxgravity.ipa.sha256
          if-no-files-found: error
