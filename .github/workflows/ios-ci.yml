name: Maxgravity CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  bridge:
    name: Bridge checks
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install bridge dependencies
        run: npm ci

      - name: Bridge typecheck
        run: npm run typecheck

      - name: Bridge lint
        run: npm run lint

      - name: Bridge tests
        run: npm test

      - name: Bridge build
        run: npm run build

      - name: Bridge security audit
        run: npm run security:audit

      - name: Bridge secret scan
        run: npm run secret-scan

      - name: Bridge license summary
        run: npm exec --yes license-checker -- --summary --production

  ios:
    name: iOS build and packaging
    needs: bridge
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Check iOS static policy
        run: node scripts/check-ios-static.mjs

      - name: Swift source lint (advisory)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if command -v swiftformat >/dev/null 2>&1; then
            swiftformat --lint Maxgravity || {
              echo "swiftformat reported style-only issues; continuing to xcodebuild for compiler verification."
              exit 1
            }
          else
            echo "swiftformat not installed on runner; relying on xcodebuild compiler diagnostics."
          fi

      - name: Build Maxgravity for simulator
        run: >
          xcodebuild
          -project Maxgravity.xcodeproj
          -scheme Maxgravity
          -configuration Release
          -destination 'generic/platform=iOS Simulator'
          -sdk iphonesimulator
          -derivedDataPath build/DerivedData
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Build Maxgravity for device
        run: >
          xcodebuild
          -project Maxgravity.xcodeproj
          -scheme Maxgravity
          -configuration Release
          -sdk iphoneos
          -derivedDataPath build/DerivedData
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=""
          build

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/Maxgravity.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            exit 1
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/Maxgravity.app
          (
            cd build
            /usr/bin/zip -qry Maxgravity-unsigned.ipa Payload
          )

      - name: Package simulator app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphonesimulator/Maxgravity.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected simulator app bundle not found at $APP_PATH"
            exit 1
          fi
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/Maxgravity-simulator-app.zip

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: maxgravity-unsigned-ipa
          path: build/Maxgravity-unsigned.ipa
          if-no-files-found: error

      - name: Upload simulator app bundle
        uses: actions/upload-artifact@v4
        with:
          name: maxgravity-simulator-app
          path: build/Maxgravity-simulator-app.zip
          if-no-files-found: error
